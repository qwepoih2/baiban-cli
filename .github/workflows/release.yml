name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: baiban-linux-x64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: baiban-linux-arm64
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            name: baiban-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: baiban-darwin-x64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: baiban-win32-x64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        uses: houseabsolute/actions-rust-cross@v1
        with:
          target: ${{ matrix.target }}
          args: "--release"

      - name: Rename binary
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/baiban.exe dist/${{ matrix.name }}
          else
            cp target/${{ matrix.target }}/release/baiban dist/${{ matrix.name }}
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
